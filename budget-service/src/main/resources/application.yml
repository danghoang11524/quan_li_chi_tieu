server:
  port: 8083

spring:
  application:
    name: budget-service
  datasource:
    url: jdbc:mysql://localhost:3306/expense_budget_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

logging:
  level:
    com.expense.budget: DEBUG
    org.hibernate.SQL: DEBUG

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
